server:
  name: catalog-service
  env: development
  port: 8082
  graceful_ttl: 30
  log_level: info
  read_timeout: 30s
  write_timeout: 30s
  idle_timeout: 120s

database:
  host: localhost
  port: 5432
  user: nova_catalog
  password: secret
  name: catalog_db
  ssl_mode: disable
  max_conns: 25
  min_conns: 5
  conn_timeout: 5s
  conn_max_lifetime: 300s

redis:
  host: localhost
  port: 6379
  password: ""
  db: 0
  pool_size: 10

kafka:
  brokers:
    - localhost:9092
  client_id: catalog-service
  group_id: catalog-service
  consume_topics:
    - user-events

telemetry:
  enabled: false
  otlp_endpoint: localhost:4317
  service_name: catalog-service

http:
  cors_allow_origins:
    - "*"

file_service:
  url: http://localhost:8085
  public_url: http://localhost:8085
