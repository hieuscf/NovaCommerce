openapi: 3.0.3
info:
  title: NovaCommerce Identity Service API
  description: |
    Authentication and user identity endpoints for NovaCommerce.

    All successful JSON responses use the envelope `{ "data": ..., "meta": null, "error": null }`.
    Error responses use `{ "data": null, "meta": null, "error": { "code", "message", "details?" } }`.

    Rate limits (per client IP):
    - `POST /auth/login` — 5 attempts / 15 minutes
    - `POST /auth/register` — 10 attempts / hour
  version: 1.0.0
  contact:
    name: NovaCommerce Platform Team

servers:
  - url: http://localhost:8081
    description: Local development

tags:
  - name: Health
    description: Service health checks
  - name: Auth
    description: Registration, login, tokens, and password flows

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      description: Returns dependency status for PostgreSQL and Redis.
      operationId: getHealth
      responses:
        "200":
          description: At least one dependency is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthEnvelope"
        "503":
          description: All dependencies are unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthEnvelope"

  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new account
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterEnvelope"
        "400":
          $ref: "#/components/responses/ValidationError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "429":
          $ref: "#/components/responses/RateLimitError"

  /auth/login:
    post:
      tags: [Auth]
      summary: Login with username or email
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Tokens issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginEnvelope"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "429":
          $ref: "#/components/responses/RateLimitError"

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
      responses:
        "200":
          description: New tokens issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginEnvelope"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout current session
      description: Revokes the provided refresh token.
      operationId: logout
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogoutRequest"
      responses:
        "204":
          description: Logged out
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  /auth/logout-all:
    post:
      tags: [Auth]
      summary: Logout all sessions
      description: Revokes all refresh tokens for the authenticated user.
      operationId: logoutAll
      security:
        - BearerAuth: []
      responses:
        "204":
          description: All sessions revoked
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current user profile
      operationId: getMe
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserEnvelope"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"

  /auth/change-password:
    put:
      tags: [Auth]
      summary: Change password
      operationId: changePassword
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageEnvelope"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Request password reset email
      description: Always returns success to avoid email enumeration.
      operationId: forgotPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordRequest"
      responses:
        "200":
          description: Reset email queued if account exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageEnvelope"
        "400":
          $ref: "#/components/responses/ValidationError"

  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset password with token
      operationId: resetPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
      responses:
        "200":
          description: Password reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageEnvelope"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFoundError"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: RS256 access token issued by the identity service

  responses:
    ValidationError:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            data: null
            meta: null
            error:
              code: VALIDATION_ERROR
              message: Key 'email' failed on the 'email' tag
    UnauthorizedError:
      description: Missing or invalid bearer token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    ConflictError:
      description: Resource already exists
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    RateLimitError:
      description: Too many requests
      headers:
        Retry-After:
          description: Seconds until the client may retry
          schema:
            type: integer
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"

  schemas:
    ApiEnvelope:
      type: object
      properties:
        data:
          type: object
          nullable: true
        meta:
          type: object
          nullable: true
        error:
          allOf:
            - $ref: "#/components/schemas/ApiError"
          nullable: true

    ApiError:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          example: VALIDATION_ERROR
        message:
          type: string
        details:
          type: object
          nullable: true

    ErrorEnvelope:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelope"
      example:
        data: null
        meta: null
        error:
          code: VALIDATION_ERROR
          message: invalid request

    HealthResult:
      type: object
      required: [status, service, version, checks]
      properties:
        status:
          type: string
          enum: [ok, unavailable]
        service:
          type: string
          example: identity-service
        version:
          type: string
          example: "1.0.0"
        checks:
          type: object
          additionalProperties:
            type: string

    HealthEnvelope:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelope"
      properties:
        data:
          $ref: "#/components/schemas/HealthResult"

    User:
      type: object
      required: [id, username, email, full_name, status, created_at]
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        email:
          type: string
          format: email
        full_name:
          type: string
        avatar_url:
          type: string
        phone:
          type: string
        status:
          type: string
          enum: [active, inactive, suspended, pending_verification]
        created_at:
          type: string
          format: date-time

    UserEnvelope:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelope"
      properties:
        data:
          $ref: "#/components/schemas/User"

    LoginOutput:
      type: object
      required: [access_token, refresh_token, expires_in, user]
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer
          format: int64
          description: Access token lifetime in seconds
        user:
          $ref: "#/components/schemas/User"

    LoginEnvelope:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelope"
      properties:
        data:
          $ref: "#/components/schemas/LoginOutput"

    RegisterOutput:
      type: object
      required: [user]
      properties:
        user:
          $ref: "#/components/schemas/User"

    RegisterEnvelope:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelope"
      properties:
        data:
          $ref: "#/components/schemas/RegisterOutput"

    MessageEnvelope:
      allOf:
        - $ref: "#/components/schemas/ApiEnvelope"
      properties:
        data:
          type: object
          properties:
            message:
              type: string

    RegisterRequest:
      type: object
      required: [username, email, password, full_name]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 30
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
          maxLength: 72
        full_name:
          type: string

    LoginRequest:
      type: object
      required: [identifier, password]
      properties:
        identifier:
          type: string
          description: Username or email address
        password:
          type: string

    RefreshTokenRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string

    LogoutRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string

    ChangePasswordRequest:
      type: object
      required: [current_password, new_password]
      properties:
        current_password:
          type: string
        new_password:
          type: string
          minLength: 8
          maxLength: 72

    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    ResetPasswordRequest:
      type: object
      required: [token, new_password]
      properties:
        token:
          type: string
        new_password:
          type: string
          minLength: 8
          maxLength: 72
