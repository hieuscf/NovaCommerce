server:
  name: identity-service
  env: development
  port: 8081
  graceful_ttl: 30
  log_level: info
  read_timeout: 30s
  write_timeout: 30s
  idle_timeout: 120s

database:
  host: localhost
  port: 5432
  user: nova_identity
  password: secret
  name: identity_db
  ssl_mode: disable
  max_conns: 25
  min_conns: 5
  conn_timeout: 5s
  conn_max_lifetime: 300s

redis:
  host: localhost
  port: 6379
  password: ""
  db: 0
  pool_size: 10

kafka:
  brokers:
    - localhost:9092
  client_id: identity-service
  group_id: identity-service

jwt:
  private_key_path: ./keys/private.pem
  public_key_path: ./keys/public.pem
  access_token_ttl: 15m
  refresh_ttl: 168h
  issuer: novacommerce-identity

email:
  from: noreply@novacommerce.com
  sendgrid_api_key: ""

rate_limit:
  login_max_attempts: 5
  login_window: 15m
  register_max_attempts: 10
  register_window: 1h

telemetry:
  otlp_endpoint: localhost:4317
  service_name: identity-service

http:
  cors_allow_origins:
    - "*"
